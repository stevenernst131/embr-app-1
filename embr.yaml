platform: nodejs
platformVersion: "20"
autoDeploy: true

run:
  port: 3000
  startCommand: node server.js

database:
  enabled: true
  engine: postgres
  framework: raw
  schema: db/schema.sql

healthCheck:
  path: /health

dependencies:
  - name: "api-key"
    envVar: "EXTERNAL_API_KEY"
    description: "Third-party API key"
    required: true
    isSecret: true